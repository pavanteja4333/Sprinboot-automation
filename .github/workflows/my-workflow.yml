name: my java build workflow

on:
    workflow_dispatch:

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v6
            - name: custom build step
              uses: ./.github/actions/spring-docker

            - name: upload artifact
              uses: actions/upload-artifact@v6
              with:
                name: my-artifact
                path: target/*.jar